    <script src="js/products.js"></script>

    <script>
        /**
         * Primindita - Dynamic Checkout Controller
         * Integrates active local cart arrays, calculates shipping charges,
         * and formats order packages to WhatsApp business APIs.
         */

        let shippingFee = 80; // Default Inside Dhaka

        /**
         * Loads local cart and generates dynamic review panels
         */
        function initializeCheckoutView() {
            const cart = window.Cart ? window.Cart.getCart() : [];
            const activeGrid = document.getElementById("checkout-active-grid");
            const emptyContainer = document.getElementById("checkout-empty-container");

            if (!activeGrid || !emptyContainer) return;

            if (cart.length === 0) {
                activeGrid.classList.add("hidden");
                emptyContainer.classList.remove("hidden");
                return;
            }

            activeGrid.classList.remove("hidden");
            emptyContainer.classList.add("hidden");

            renderCheckoutItems();
            updateBillSummary();
        }

        /**
         * Dynamic renderer of ordered product list in sidebar
         */
        function renderCheckoutItems() {
            const listContainer = document.getElementById("checkout-items-list");
            if (!listContainer) return;

            const cart = window.Cart ? window.Cart.getCart() : [];
            const lang = localStorage.getItem("primindita_lang") || "bn";
            const isBn = lang === "bn";

            let itemsHtml = "";
            cart.forEach(item => {
                const product = window.products.find(p => p.id === item.id);
                if (!product) return;

                const title = isBn ? product.titleBn : product.titleEn;
                const formattedPrice = window.Cart.formatCurrency(product.price);
                const totalItemPrice = window.Cart.formatCurrency(product.price * item.qty);
                const qtyStr = window.Cart.formatNumber(item.qty);

                itemsHtml += `
                    <div class="flex items-center gap-3 py-3">
                        <div class="w-12 h-12 bg-[#FAF4E8] border border-gray-100 rounded p-0.5 flex-shrink-0 flex items-center justify-center">
                            ${product.svgMarkup}
                        </div>
                        <div class="flex-1 min-w-0">
                            <h5 class="text-xs font-bold text-charcoal truncate font-bn">${title}</h5>
                            <p class="text-[10px] text-gray-400 font-bn">${formattedPrice} × ${qtyStr}</p>
                        </div>
                        <div class="text-xs font-bold text-crimson font-bn">
                            ${totalItemPrice}
                        </div>
                    </div>
                `;
            });

            listContainer.innerHTML = itemsHtml;
        }

        /**
         * Manages delivery region selection transitions and adjusts bill calculation
         */
        function updateDeliveryFeeState() {
            const zones = document.getElementsByName("delivery-zone");
            let selectedZone = "inside";

            for (let i = 0; i < zones.length; i++) {
                if (zones[i].checked) {
                    selectedZone = zones[i].value;
                    break;
                }
            }

            shippingFee = selectedZone === "inside" ? 80 : 150;
            updateBillSummary();
        }

        /**
         * Performs arithmetic updates on subtotals and grand totals
         */
        function updateBillSummary() {
            if (!window.Cart) return;

            const subtotal = window.Cart.getCartTotal();
            const grandTotal = subtotal + shippingFee;

            document.getElementById("checkout-subtotal").textContent = window.Cart.formatCurrency(subtotal);
            document.getElementById("checkout-shipping").textContent = window.Cart.formatCurrency(shippingFee);
            document.getElementById("checkout-grand-total").textContent = window.Cart.formatCurrency(grandTotal);
        }

        /**
         * Formulates order data and launches WhatsApp API link
         * @param {Event} event - Form submission
         */
        function executeCheckoutRedirect(event) {
            event.preventDefault();

            const name = document.getElementById("customer-name").value.trim();
            const phone = document.getElementById("customer-phone").value.trim();
            const address = document.getElementById("customer-address").value.trim();

            const zones = document.getElementsByName("delivery-zone");
            let deliveryZoneText = "Inside Dhaka";
            for (let i = 0; i < zones.length; i++) {
                if (zones[i].checked) {
                    deliveryZoneText = zones[i].value === "inside" ? "Inside Dhaka" : "Outside Dhaka (National)";
                    break;
                }
            }

            const paymentMethods = document.getElementsByName("payment-method");
            let paymentText = "Cash on Delivery";
            for (let i = 0; i < paymentMethods.length; i++) {
                if (paymentMethods[i].checked) {
                    paymentText = paymentMethods[i].value === "cod" ? "Cash on Delivery" : "bKash / Nagad Transfer";
                    break;
                }
            }

            const cart = window.Cart.getCart();
            const subtotal = window.Cart.getCartTotal();
            const grandTotal = subtotal + shippingFee;

            const lang = localStorage.getItem("primindita_lang") || "bn";
            const isBn = lang === "bn";

            // Format items list for message text
            let itemsMessageBlock = "";
            cart.forEach((item, index) => {
                const product = window.products.find(p => p.id === item.id);
                if (!product) return;
                const title = isBn ? product.titleBn : product.titleEn;
                itemsMessageBlock += `${index + 1}. ${title} (Code: ${product.id}) × ${item.qty} Qty\n`;
            });

            const waNumber = "8801700000000"; // Business WhatsApp Number

            // Constructing finalized package
            let finalizedMessage = "";
            if (isBn) {
                finalizedMessage =
                    `নমস্কার প্রিমিন্দীতা! আমি নিম্নোক্ত ঐতিহ্যবাহী শাড়ি / গহনা অর্ডার করতে চাই:\n\n` +
                    `📦 নির্বাচিত পণ্যসমূহ:\n` +
                    `${itemsMessageBlock}\n` +
                    `💳 বিল বিবরণী:\n` +
                    `• পণ্যের মোট মূল্য: ৳ ${subtotal.toLocaleString('en-IN')}\n` +
                    `• ডেলিভারি চার্জ: ৳ ${shippingFee}\n` +
                    `• সর্বমোট বিল: ৳ ${grandTotal.toLocaleString('en-IN')}\n\n` +
                    `👤 গ্রাহক পরিচিতি ও ঠিকানা:\n` +
                    `• নাম: ${name}\n` +
                    `• মোবাইল নম্বর: ${phone}\n` +
                    `• ঠিকানা: ${address}\n` +
                    `• ডেলিভারি এলাকা: ${deliveryZoneText === "Inside Dhaka" ? "ঢাকা সিটি" : "ঢাকার বাইরে"}\n` +
                    `• পেমেন্ট মেথড: ${paymentText === "Cash on Delivery" ? "ক্যাশ অন ডেলিভারি" : "বিকাশ / নগদ পার্সোনাল"}\n\n` +
                    `অনুগ্রহ করে আমার অর্ডারটি নিশ্চিত করে ডেলিভারি প্রক্রিয়া শুরু করার তথ্য দিন। ধন্যবাদ!`;
            } else {
                finalizedMessage =
                    `Hello Primindita! I would like to place an order for the following artisanal selections:\n\n` +
                    `📦 Selected Items:\n` +
                    `${itemsMessageBlock}\n` +
                    `💳 Bill Breakdown:\n` +
                    `• Subtotal: BDT ${subtotal.toLocaleString('en-IN')}\n` +
                    `• Delivery Fee: BDT ${shippingFee}\n` +
                    `• Grand Total: BDT ${grandTotal.toLocaleString('en-IN')}\n\n` +
                    `👤 Delivery Address Details:\n` +
                    `• Customer Name: ${name}\n` +
                    `• Phone Number: ${phone}\n` +
                    `• Delivery Address: ${address}\n` +
                    `• Region Zone: ${deliveryZoneText}\n` +
                    `• Payment Method: ${paymentText}\n\n` +
                    `Please verify my order details and guide me on the delivery timeline. Thank you!`;
            }

            // Cleanly encode WA API link
            const encodedText = encodeURIComponent(finalizedMessage);
            const fullWaLink = `https://wa.me/${waNumber}?text=${encodedText}`;

            // Wipe local checkout cart after brief transition delay
            setTimeout(() => {
                window.Cart.clearCart();
                initializeCheckoutView();
            }, 1000);

            // Open redirect tab
            window.open(fullWaLink, "_blank");
        }

        // Initialize view on load
        document.addEventListener("DOMContentLoaded", () => {
            initializeCheckoutView();
        });

        // Sync list instantly on external cart adjustments
        window.addEventListener("priminditaCartUpdated", () => {
            initializeCheckoutView();
        });

        // Register localized transition updates
        window.addEventListener("priminditaLangUpdated", (e) => {
            initializeCheckoutView();
            const nameInput = document.getElementById("customer-name");
            const phoneInput = document.getElementById("customer-phone");
            const addressInput = document.getElementById("customer-address");

            // Adjust form placeholders according to language updates
            const isBn = e.detail === "bn";
            if (nameInput) nameInput.setAttribute("placeholder", isBn ? "নামটি লিখুন..." : "Enter your full name...");
            if (phoneInput) phoneInput.setAttribute("placeholder", isBn ? "১১ ডিজিটের মোবাইল নম্বর..." : "e.g. 017XXXXXXXX...");
            if (addressInput) addressInput.setAttribute("placeholder", isBn ? "ফ্ল্যাট, হাউজ নম্বর, রোড, থানা, জেলা উল্লেখ করুন..." : "Enter your house number, street address, and city...");
        });
    </script>
</body>

</html>
